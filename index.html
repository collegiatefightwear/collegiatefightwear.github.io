<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #FAF9F6, #FFFAF0);
      color: black;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 10%;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .nav-links a {
      color: black;
      text-decoration: none;
      margin-left: 20px;
    }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
    }

    .hero-content {
      max-width: 700px;
      width: 100%;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .subscribe-box {
      background: #D3D3D3;
      padding: 30px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    .subscribe-box h2 {
      margin-bottom: 15px;
    }

    .subscribe-box p {
      margin-bottom: 20px;
      font-size: 1rem;
    }

    .subscribe-form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .subscribe-form input {
      padding: 14px;
      border: none;
      border-radius: 8px;
      width: 280px;
      max-width: 100%;
      font-size: 1rem;
    }

    .subscribe-form button {
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      background: white;
      color: #FFFAF0;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .subscribe-form button:hover {
      transform: translateY(-2px);
    }

    #message {
      margin-top: 15px;
      font-size: 0.95rem;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }

      .hero p {
        font-size: 1rem;
      }

      nav {
        flex-direction: column;
        gap: 10px;
      }

      .subscribe-form {
        flex-direction: column;
      }

      .subscribe-form input,
      .subscribe-form button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Collegiate Fightwear</div>

  </nav>

 
  <section class="hero">
    <div class="hero-content">
      <h1>The standard for college branded fightwear.</h1>

    

      <div class="subscribe-box">
        <h2>Join Our Mailing List</h2>

        <p>Receive a personal email when new designs are ready.</p>

        <form class="subscribe-form" onsubmit="subscribe(event)">
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />

          <button type="submit">Subscribe</button>
        </form>

        <div id="message"></div>
      </div>
    </div>
  </section>

  <footer>
    
  </footer>

</body>
</html>
